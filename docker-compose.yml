services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dimensionlab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dimensionlab}
      POSTGRES_USER:     ${POSTGRES_USER:-dluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dluser} -d ${POSTGRES_DB:-dimensionlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dimensionlab-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dimensionlab}
      DB_USERNAME: ${POSTGRES_USER:-dluser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

      JWT_SECRET:            ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}

      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      COOKIE_SECURE:        ${COOKIE_SECURE:-true}

      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      STORAGE_PATH: /app/uploads

      EVOLUTION_ENABLED:      ${EVOLUTION_ENABLED:-false}
      EVOLUTION_BASE_URL:     ${EVOLUTION_BASE_URL:-}
      EVOLUTION_INSTANCE:     ${EVOLUTION_INSTANCE:-}
      EVOLUTION_ADMIN_NUMBER: ${EVOLUTION_ADMIN_NUMBER:-}

      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /actuator/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3' 2>/dev/null | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""   # vazio = nginx proxy transparente via /api/
    container_name: dimensionlab-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge