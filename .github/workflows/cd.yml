name: CD — Deploy

on:
  workflow_run:
    workflows: ["CI — Frontend", "CI — Backend"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    name: Verificar CIs
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Checar se ambos os CIs passaram neste commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha
            const branch = context.payload.workflow_run.head_branch

            if (branch !== 'main') {
              console.log(`Branch ignorada: ${branch}`)
              core.setOutput('deploy', 'false')
              return
            }

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              status: 'completed',
              per_page: 50,
            })

            const required = ['CI — Frontend', 'CI — Backend']
            const runs = required.map(name =>
              data.workflow_runs.find(r => r.name === name)
            )
            const anyRan = runs.some(r => r !== undefined)
            const allRanPassed = runs.every(r => !r || r.conclusion === 'success')
            const allPassed = anyRan && allRanPassed

            console.log(`SHA: ${sha}`)
            required.forEach((name, i) => {
              const run = runs[i]
              console.log(`  ${name}: ${run ? run.conclusion : 'não rodou (ignorado)'}`)
            })
            console.log(`Deploy: ${allPassed}`)

            core.setOutput('deploy', allPassed ? 'true' : 'false')

  deploy:
    name: Deploy VPS
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (com submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_REPO_PAT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/dimension-lab
            git pull origin main --recurse-submodules
            docker compose up -d --build --remove-orphans
            docker image prune -f