name: CI — Backend

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       dimensionlab_test
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d dimensionlab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL:      jdbc:postgresql://localhost:5432/dimensionlab_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass
      JWT_SECRET:  ci-test-secret-key-long-enough-for-hs256-algorithm

    steps:
      - name: Checkout (com submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Java 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Permissão no gradlew
        run: chmod +x gradlew

      - name: Rodar testes
        run: ./gradlew test --no-daemon

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: test-report-backend
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Verificar build (bootJar)
        run: ./gradlew bootJar --no-daemon -x test